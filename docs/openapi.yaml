openapi: "3.0.3"
info:
  title: Axiom Core / ULE Product API
  description: |
    Unified API contracts for Axiom runtime (`axiom-api`) and ULE commercial ProductGateway
    (`axiom-demo-taskflow` gateway). Business logic remains Signal→Cell→Composer; HTTP is U7 only.
  version: "0.5.0"
  contact:
    name: Axiom Core Contributors
    url: https://github.com/arwei944/axiom-core

servers:
  - url: http://localhost:19092
    description: ULE ProductGateway (taskflow gateway / surface)
  - url: http://localhost:9092
    description: axiom-api skeleton

paths:
  /api/v1/health:
    get:
      summary: Get system health status
      description: Returns overall health status of the Axiom Core system including cell counts, message statistics, and entropy score
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHealth'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/cells:
    get:
      summary: Get all cells
      description: Returns a list of all cells with their current state and metadata
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiCell'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/heatmap:
    get:
      summary: Get activity heatmap
      description: Returns real-time activity heatmap showing hot cells, signals, and tools
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiHeatmap'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/entropy:
    get:
      summary: Get entropy status
      description: Returns current entropy score, level, per-cell entropy values, and last governance action
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEntropy'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/v1/metrics:
    get:
      summary: Get metrics (JSON on ProductGateway; Prometheus text also at /metrics)
      description: ProductGateway returns JSON snapshot at this path; Prometheus text at GET /metrics
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
            text/plain:
              schema:
                type: string
                description: Prometheus text format metrics (also on /metrics)
        '404':
          description: Metrics not configured

  /metrics:
    get:
      summary: Prometheus text exposition (ProductGateway)
      responses:
        '200':
          description: Prometheus text
          content:
            text/plain:
              schema:
                type: string

  /api/v1/surface:
    get:
      summary: Unified observation surface (ULE ProductGateway)
      description: |
        Single host truth — health, governor (admit_authority=governor), runs, metrics,
        write_api, events_api, ops_shell. Not a second dashboard authority.
      responses:
        '200':
          description: Surface JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  admit_authority:
                    type: string
                    example: governor
                  history:
                    type: string
                    example: witness-only
                  write_api:
                    type: string
                  events_api:
                    type: string

  /api/v1/tasks:
    post:
      summary: Submit task (write path → Signal SubmitTask → TaskCell)
      description: |
        U7 adapter only. Publishes SubmitTask Signal to TaskCell; Governor product_admit
        runs inside the Cell before Composer. Returns witness_count and governor fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, payload]
              properties:
                title:
                  type: string
                priority:
                  type: integer
                payload:
                  type: string
      responses:
        '201':
          description: Task accepted and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskWriteResult'
        '403':
          description: Governor rejected admit
        '422':
          description: Pipeline / validation failure
        '400':
          description: Invalid JSON

  /api/v1/events:
    get:
      summary: Server-Sent Events push stream
      description: |
        SSE stream. Event types include stream.open, task.completed, governor.alert.
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string

  /ops:
    get:
      summary: Minimal ops HTML shell
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /api/v1/alerts:
    get:
      summary: Governor-linked alert log (demo floor)
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    TaskWriteResult:
      type: object
      properties:
        ok:
          type: boolean
        error:
          type: string
          nullable: true
        governor_level:
          type: string
        governor_score:
          type: number
        witness_count:
          type: integer
        admit_authority:
          type: string
          example: governor
        path:
          type: string
  schemas:
    ApiHealth:
      type: object
      description: System health status
      properties:
        status:
          type: string
          description: Overall system status (ok/degraded/critical)
        cells_running:
          type: integer
          description: Number of currently running cells
        cells_stopped:
          type: integer
          description: Number of stopped cells
        total_restarts:
          type: integer
          description: Total number of cell restarts
        messages_delivered:
          type: integer
          description: Total number of successfully delivered messages
        messages_rejected:
          type: integer
          description: Total number of rejected messages
        entropy_score:
          type: number
          format: double
          description: Current entropy score (0-1)
        entropy_level:
          type: string
          description: Entropy level (green/yellow/orange/red)
        preflight_passed:
          type: boolean
          description: Whether preflight checks passed
        uptime_ms:
          type: integer
          description: System uptime in milliseconds
        version:
          type: string
          description: Axiom Core version
      required:
        - status
        - cells_running
        - cells_stopped
        - total_restarts
        - messages_delivered
        - messages_rejected
        - entropy_score
        - entropy_level
        - preflight_passed
        - uptime_ms
        - version

    ApiCell:
      type: object
      description: Cell information
      properties:
        id:
          type: string
          description: Unique cell identifier
        layer:
          type: string
          description: Cell layer (exec/validate/agent/oversight)
        state:
          type: string
          description: Cell state (Running/Stopped/Error)
        version:
          type: string
          description: Cell version
      required:
        - id
        - layer
        - state
        - version

    ApiHeatmap:
      type: object
      description: Activity heatmap
      properties:
        timestamp:
          type: integer
          description: Timestamp in nanoseconds
        hot_cells:
          type: array
          items:
            type: array
            items:
              - type: string
                description: Cell ID
              - type: integer
                description: Activity count
        hot_signals:
          type: array
          items:
            type: array
            items:
              - type: string
                description: Signal type
              - type: integer
                description: Signal count
        hot_tools:
          type: array
          items:
            type: array
            items:
              - type: string
                description: Tool name
              - type: integer
                description: Tool invocation count
      required:
        - timestamp
        - hot_cells
        - hot_signals
        - hot_tools

    ApiEntropy:
      type: object
      description: Entropy status
      properties:
        value:
          type: number
          format: double
          description: Current entropy value (0-1)
        level:
          type: string
          description: Entropy level (green/yellow/orange/red)
        per_cell:
          type: array
          items:
            type: array
            items:
              - type: string
                description: Cell ID
              - type: number
                format: double
                description: Entropy value for this cell
        last_action:
          type: string
          nullable: true
          description: Last governance action taken
      required:
        - value
        - level
        - per_cell

    ApiError:
      type: object
      description: API error response
      properties:
        error:
          type: string
          description: Error type
      required:
        - error

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
