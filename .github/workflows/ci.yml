name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lightweight pointer: full architecture enforcement lives in architecture-gates.yml
  # (archcheck, ISA discipline, ULE product path, forbidden patterns).
  architecture-gates-pointer:
    name: see Architecture Gates workflow
    runs-on: ubuntu-latest
    steps:
      - name: Architecture compliance
        run: |
          echo "Architecture enforcement runs in workflow: Architecture Gates"
          echo "Jobs: archcheck | ISA discipline | ULE product path | forbidden-patterns"
          echo "Required check name for branch protection: architecture-gates-ok"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      
      - name: Build workspace
        run: cargo build --workspace

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Run rustfmt
        run: cargo fmt --all --check

  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      
      - name: Build with nightly
        run: cargo build --workspace 2>&1 || true