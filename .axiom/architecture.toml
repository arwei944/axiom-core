[crate-layers]
# Layer 0: 顶层应用
axiom-cli = 0
axiom-bench = 0

# Layer 1: 可视化与API网关
axiom-viz = 1
axiom-api = 1

# Layer 2: Agent 门面
axiom-identity = 2
axiom-prompt = 2

# Layer 3: 监督与集成
axiom-mcp = 3
axiom-alert = 3
axiom-agent = 3
axiom-oversight = 3

# Layer 4: 运行时与协调
axiom-distributed = 4
axiom-planner = 4
axiom-runtime = 4

# Layer 5: 存储与工具
axiom-llm = 5
axiom-tool = 5
axiom-memory = 5
axiom-store = 5

# Layer 6: （预留）

# Layer 7: 核心原语
axiom-kernel = 7
axiom-core = 7  # deprecated: compatibility layer over axiom-kernel

# Layer 8: Proc-macro（豁免）
axiom-macros = 8

# Layer 9: Plugin SDK 和示例
axiom-plugin-wasm-sdk = 9
axiom-plugin-test = 9
axiom-plugin-example-wasm = 9

[forbidden-deps]
async-trait = "R-004: Rust 1.75+ 已支持原生 async fn in traits"

[audited-deps]
# 异步运行时
tokio = "async 运行时和工具"
serde = "序列化框架"
serde_json = "JSON 序列化"
serde_yaml = "YAML 序列化（agent manifest 配置）"
thiserror = "错误处理"
anyhow = "错误处理"
tracing = "结构化日志"
tracing-subscriber = "日志订阅器"
sha2 = "加密哈希"
uuid = "唯一标识符"
futures = "future 组合器"
clap = "CLI 解析"
ratatui = "终端 UI"
crossterm = "终端操作"
syn = "Rust 解析（proc-macro）"
quote = "代码生成（proc-macro）"
proc-macro2 = "token 表示（proc-macro）"
linkme = "分布式 slice 链接器"
trybuild = "编译测试运行器"
regex = "正则表达式"
parking_lot = "同步原语"
dashmap = "并发 hashmap"
prometheus = "Prometheus 指标格式（viz metrics）"
sqlx = "SQL 工具包（runtime）"
snap = "snappy 压缩（store）"
tempfile = "临时文件（store）"
criterion = "基准测试（bench）"
schemars = "JSON Schema 生成"
reqwest = "HTTP 客户端"
url = "URL 解析"
axum = "Web 框架"
tower = "服务抽象层（API 测试工具）"
toml = "TOML 解析（build gate + archcheck）"
walkdir = "目录遍历（archcheck）"
once_cell = "延迟初始化（archcheck）"
archcheck = "编译期架构门禁"
bincode = "二进制序列化（codec 可选依赖）"
proptest = "属性测试框架（store 测试）"
loom = "并发测试框架（store 测试）"
# WASM 和插件相关（kernel）
wasmtime = "WASM 运行时（plugin loader）"
wasmtime-wasi = "WASI 支持（plugin loader）"
wasmtime-component-util = "WASM component 工具（plugin loader）"
libloading = "动态库加载（native plugin loader）"
glob = "文件路径匹配（plugin loader）"
postcard = "二进制序列化（plugin IPC）"
semver = "语义化版本（plugin versioning）"

[dev-dependencies-audit]
enabled = true
note = "所有 dev-dependencies 也必须遵守 forbidden-deps 和 audited-deps"

[proc-macro-exemptions]
axiom-macros = { allowed_deps = ["axiom-kernel"], reason = "Proc-macro 必须引用 kernel 类型以进行宏展开" }

[reverse-dependency-exemptions]
axiom-agent = { allowed_deps = ["axiom-identity", "axiom-prompt"], reason = "Agent 需要调用 identity/prompt facade 完成用户交互" }
axiom-plugin-example-wasm = { allowed_deps = ["axiom-kernel"], reason = "示例 WASM plugin 依赖 kernel API" }
axiom-plugin-test = { allowed_deps = ["axiom-kernel"], reason = "测试 plugin 依赖 kernel API" }
axiom-plugin-wasm-sdk = { allowed_deps = ["axiom-kernel"], reason = "WASM SDK 需要引用 kernel 类型定义" }

[layer-leakage-exemptions]
axiom-oversight.EntropyGovernorCell = { source_crate = "axiom-runtime", reason = "EntropyGovernorCell 定义在 axiom-runtime 中以避免循环依赖（oversight→runtime→oversight），oversight 仅重新导出供上层使用" }
