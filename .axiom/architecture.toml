[crate-layers]
# Layer 0: 顶层应用
axiom-cli = 0
axiom-bench = 0

# Layer 1: 可视化
axiom-viz = 1

# Layer 2: Agent 门面
axiom-identity = 2
axiom-prompt = 2

# Layer 3: 监督与集成
axiom-mcp = 3
axiom-alert = 3
axiom-agent = 3
axiom-oversight = 3

# Layer 4: 运行时与协调
axiom-distributed = 4
axiom-planner = 4
axiom-runtime = 4

# Layer 5: 存储与工具
axiom-llm = 5
axiom-tool = 5
axiom-memory = 5
axiom-store = 5

# Layer 6: （预留）

# Layer 7: 核心原语
axiom-core = 7

# Layer 8: Proc-macro（豁免）
axiom-macros = 8

[forbidden-deps]
async-trait = "R-004: Rust 1.75+ 已支持原生 async fn in traits"

[audited-deps]
# 异步运行时
tokio = "async 运行时和工具"
serde = "序列化框架"
serde_json = "JSON 序列化"
thiserror = "错误处理"
anyhow = "错误处理"
tracing = "结构化日志"
tracing-subscriber = "日志订阅器"
sha2 = "加密哈希"
uuid = "唯一标识符"
futures = "future 组合器"
clap = "CLI 解析"
ratatui = "终端 UI"
crossterm = "终端操作"
syn = "Rust 解析（proc-macro）"
quote = "代码生成（proc-macro）"
proc-macro2 = "token 表示（proc-macro）"
linkme = "分布式 slice 链接器"
trybuild = "编译测试运行器"
regex = "正则表达式"
parking_lot = "同步原语"
dashmap = "并发 hashmap"
sqlx = "SQL 工具包（runtime）"
snap = "snappy 压缩（store）"
tempfile = "临时文件（store）"
criterion = "基准测试（bench）"
schemars = "JSON Schema 生成"
reqwest = "HTTP 客户端"
url = "URL 解析"
axum = "Web 框架"
toml = "TOML 解析（build gate + archcheck）"
walkdir = "目录遍历（archcheck）"
once_cell = "延迟初始化（archcheck）"
archcheck = "编译期架构门禁"

[dev-dependencies-audit]
enabled = true
note = "所有 dev-dependencies 也必须遵守 forbidden-deps 和 audited-deps"

[proc-macro-exemptions]
axiom-macros = { allowed_deps = ["axiom-core"], reason = "Proc-macro 必须引用 core 类型以进行宏展开" }

[reverse-dependency-exemptions]
axiom-agent = { allowed_deps = ["axiom-identity", "axiom-prompt"], reason = "Agent 需要调用 identity/prompt facade 完成用户交互" }
